# ==============================================================================
# 【 🚫 协同 ModernZ 核心配置，请勿修改 】
# 以下配置用于禁用原生界面、接管无边框控制栏，修改会导致界面重叠或白边闪烁
# ==============================================================================
osc=no                                  # 必须为 no：禁用原生控制条，避免与 ModernZ 重叠
osd-bar=no                              # 必须为 no：禁用原生进度条，交由 ModernZ 统一接管
border=yes                              # 必须开启：保留 Win11 窗口原生圆角、大阴影和物理拉伸
title-bar=no                            # 必须为 no：剥离 Y 轴原生标题栏，实现窗口无缝沉浸与 Z 轴悬浮
title="${filename/no-ext}"              # 【核心项】必须配置，使窗口标题与 ModernZ 顶栏统一握手

# ==============================================================================
# 【 ⚙️ 可根据显卡与 CPU 性能灵活调配 】
# 以下音视频渲染配置针对中端显卡（如 AMD 4800U 核显及以上）进行了画质与性能的平衡调优
# ==============================================================================
vo=gpu-next                             # 现代化渲染后端（若老旧显卡报错，可改回 gpu）
gpu-api=d3d11                           # Windows 下核显最高效稳定的 API（N卡/A卡独显均适用）
hwdec=d3d11va                           # 硬件解码驱动（N卡可尝试 nvdec，若卡顿可改 auto 或 no 软解）
ao=wasapi                               # Windows 音频驱动（追求极佳延迟与无损输出）

# --- 图像拉伸缩放算法（针对 2K/1080P 屏幕平衡调校） ---
profile=high-quality                    # 高画质基础预设
scale=spline36                          # 放大算法：抗光晕与算力占用的极佳平衡（高端显卡可改 ewa_lanczos）
cscale=bicubic                          # 色度拉伸：人眼不敏感，用 bicubic 极省显卡算力
dscale=mitchell                         # 缩小算法（如4K缩至2K）：抗锯齿极佳，画面自然圆润
sigmoid-upscaling=yes                   # 亮度非线性平滑，抑制边缘黑边光晕

# --- 色彩管理与高级画面处理 ---
icc-profile-auto=yes                    # 自动读取 Windows 系统色彩管理中配置的屏幕 ICC 曲线
target-prim=srgb                        # 强制指定目标屏幕为标准 sRGB，确保 HDR/广色域视频精准映射不偏色
tone-mapping=bt.2446a                   # HDR 转 SDR 算法：提供合理的明暗细节还原
deband=yes                              # 开启去色带断层功能（对动漫、低码率流媒体有奇效）
deband-iterations=2                     # 去色带迭代次数（高配置可设为 3 或 4）
deband-threshold=35                     # 去色带阈值，越大去色带越强（但会轻微损失画面噪点细节）

# ==============================================================================
# 【 📁 播放习惯与字幕配置，可根据个人偏好修改 】
# ==============================================================================
no-autofit                              # 固定初始尺寸，禁止随视频分辨率自动缩放窗口
geometry=1600x900                       # 初始启动窗口大小

save-position-on-quit=yes               # 退出时自动保存播放进度
autocreate-playlist=same                # 自动加载同目录下的其他媒体文件到播放列表（MPV 0.39.0+ 原生功能）

sub-auto=fuzzy                          # 自动加载同目录下的模糊匹配外挂字幕
sub-file-paths=sub,subs,subtitles,Sub,Subs,Subtitles # 自动搜索加载子目录中的字幕文件

# 优先选择的音轨语言（按逗号顺序从左至右匹配）
alang=zh-CN,zh-Hans,zh,chi,zho,chs,sc,zh-TW,zh-HK,zh-Hant,cht,tc,en,eng
# 优先选择的字幕语言
slang=zh-CN,zh-Hans,chs,sc,zh,chi,zho,zh-TW,zh-HK,zh-Hant,cht,tc,en,eng

# OSD 状态文字大小与字效微调
osd-font-size=22
osd-border-size=1.2
osd-shadow-offset=1.5
osd-shadow-color="#40000000"