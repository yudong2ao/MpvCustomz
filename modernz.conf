# ==============================================================================
# ModernZ - 1600x900 优化配置（已完美修复全屏按钮过大与沉浸式顶栏）
# ==============================================================================

# Language and display
language=zh
layout=default
icon_theme=fluent
icon_style=mixed
font=mpv-osd-symbols

# show mpv logo when idle
idlescreen=yes

# === 【优化：窗口顶栏自动悬浮沉浸】 ===
window_top_bar=auto
showwindowed=yes
showfullscreen=yes
showonselect=no
showonpause=yes
keeponpause=no
greenandgrumpy=no

# OSC behaviour and scaling
hidetimeout=1500
keep_with_cursor=yes
fadeduration=200
fadein=yes
minmousemove=0
deadzonesize=0.75
deadzone_hide=instant
osc_on_seek=yes
osc_on_start=both
mouse_seek_pause=yes
force_seek_tooltip=no

# scale osc with the video
vidscale=no

# 统一窗口与全屏的缩放系数
scalewindowed=1.5
scalefullscreen=1.5

# 保持关闭文本标题，让顶栏最清爽
show_title=no
title=${media-title}

# === 【核心修改：绝杀全屏按钮过大问题】 ===
# 将顶栏组件的基准大小从 26 精准缩减至 14。
# 这样在乘以 1.5 的全屏放大系数后，右上角的缩小、放大、关闭按钮将呈现极致精细、协调的现代风格。
title_font_size=14
chapter_title_font_size=16
window_title_font_size=19

truncate_title=yes
cache_info=no
cache_info_speed=no
cache_info_font_size=12

# show chapter title
show_chapter_title=yes
chapter_above_title=no
chapter_fmt=%s

# time display
timecurrent=yes
timems=no
unicodeminus=no
time_format=dynamic

time_font_size=18
tooltip_font_size=16
speed_font_size=18

# Title bar settings
show_window_title=yes

# === 【核心修改：开启无边框模式下的现代控件】 ===
# 配合 mpv.conf 的 border=no，在窗口和全屏下都用 ModernZ 的精美半透明悬浮控件替代系统白边框
window_controls=yes
windowcontrols_independent=yes
window_controls_size=16

# Subtitle and OSD display settings
sub_margins=yes
osd_margins=no
dynamic_margins=yes

# Buttons display and functionality
subtitles_button=yes
audio_tracks_button=yes
jump_buttons=yes
jump_amount=10
jump_more_amount=60
jump_icon_number=yes
jump_mode=relative
jump_softrepeat=yes
chapter_skip_buttons=no
track_nextprev_buttons=yes

# show mute button and volume slider
volume_control=yes
volume_control_type=linear
volumebar_unmute_on_click=no
playlist_button=yes
hide_empty_playlist_button=no
gray_empty_playlist_button=no

# show fullscreen toggle button
fullscreen_button=yes
info_button=yes
ontop_button=yes
ontop_in_topbar=no
screenshot_button=yes

# show download button on web videos
download_button=yes
download_path=~~desktop/mpv

# show file loop button
loop_button=yes
shuffle_button=no
speed_button=yes

buttons_always_active=none

# icon size
playpause_size=28
midbuttons_size=24
sidebuttons_size=24

# zoom controls
zoom_control=yes
zoom_in_max=4
zoom_out_min=-1

# Colors and style
osc_color=#000000
window_title_color=#FFFFFF
window_controls_color=#FFFFFF
windowcontrols_close_hover=#F45C5B
windowcontrols_max_hover=#F8BC3A
windowcontrols_min_hover=#43CB44
title_color=#FFFFFF
cache_info_color=#FFFFFF
seekbar_cache_color=#B1B1B1
seekbarfg_color=#FF8232
seekbarbg_color=#999999
seek_handle_color=#C96508
seek_handle_border_color=#FF8232
volumebar_match_seek_color=no
time_color=#FFFFFF
chapter_title_color=#FFFFFF
side_buttons_color=#FFFFFF
middle_buttons_color=#FFFFFF
playpause_color=#FFFFFF
held_element_color=#999999
hover_effect_color=#FF8232
thumbnail_box_color=#111111
thumbnail_box_outline=#404040
nibble_color=#FF8232
nibble_current_color=#FFFFFF
ab_loop_color=#2596be

# === 【沉浸式调校：半透明与磨砂渐变】 ===
osc_fade_strength=100
fade_blur_strength=100
fade_transparency_strength=0
# 顶栏保持 100% 的高级半透明渐变，由于字号增大到 19，将范围扩展到 125 像素
window_fade_strength=150
# 顶栏悬浮背景启用高级动态模糊，与 OSD 完美协调
window_fade_blur_strength=100
window_fade_transparency_strength=0
thumbnail_box_padding=4.5
thumbnail_box_radius=4
thumbnail_box_outline_size=1

# Button interaction settings
hover_effect=size,glow,color,box
button_hover_size=115
button_held_size=100
button_held_box_alpha=18
button_glow_amount=5
slider_hover_size=100
tooltip_hints=yes

# Progress bar settings
seek_handle_size=0.8
seek_handle_border_size=0.42
seek_handle_border_hover_size=0.31
seekbar_height=medium
seekrange=yes
seekrangealpha=150
livemarkers=yes
seekbarkeyframes=yes
slider_rounded_corners=yes

nibbles_style=gap
nibbles_top=yes
nibbles_bottom=yes

automatickeyframemode=yes
automatickeyframelimit=600

persistent_progress=no
persistent_progress_height=17
persistent_buffer=no

# Miscellaneous settings
visibility=auto
visibility_modes=never_auto_always
tick_delay=0.0167
tick_delay_follow_display_fps=no

# Elements Position
title_offset=20
title_with_chapter_offset=5
chapter_title_offset=18
chapter_above_title_offset=3
time_codes_offset=0
tooltip_height_offset=5
portrait_window_trigger=950
hide_volume_bar_trigger=1150
osc_height=60

## Mouse commands (完全保留)
title_mbtn_left_command=script-binding stats/display-page-5
title_mbtn_mid_command=show-text ${path}
title_mbtn_right_command=script-binding select/select-watch-history

chapter_title_mbtn_left_command=script-binding select/select-chapter
chapter_title_mbtn_right_command=show-text ${chapter-list} 3000

seekbar_wheel_up_command=seek 10
seekbar_wheel_down_command=seek -10

playlist_mbtn_left_command=script-binding select/select-playlist
playlist_mbtn_right_command=script-binding select/menu

vol_ctrl_mbtn_left_command=no-osd cycle mute
vol_ctrl_mbtn_right_command=script-binding select/select-audio-device
vol_ctrl_wheel_down_command=osd-msg add volume -5
vol_ctrl_wheel_up_command=osd-msg add volume 5
volumebar_wheel_down_command=osd-msg add volume -5
volumebar_wheel_up_command=osd-msg add volume 5

audio_track_mbtn_left_command=script-binding select/select-aid
audio_track_mbtn_mid_command=cycle audio down
audio_track_mbtn_right_command=cycle audio
audio_track_wheel_down_command=cycle audio
audio_track_wheel_up_command=cycle audio down

sub_track_mbtn_left_command=script-binding select/select-sid
sub_track_mbtn_mid_command=cycle sub down
sub_track_mbtn_right_command=cycle sub
sub_track_wheel_down_command=cycle sub
sub_track_wheel_up_command=cycle sub down

play_pause_mbtn_left_command=cycle pause
play_pause_mbtn_mid_command=cycle-values loop-playlist inf no
play_pause_mbtn_right_command=cycle-values loop-file inf no

chapter_prev_mbtn_left_command=add chapter -1
chapter_prev_mbtn_mid_command=show-text ${chapter-list} 3000
chapter_prev_mbtn_right_command=script-binding select/select-chapter

chapter_next_mbtn_left_command=add chapter 1
chapter_next_mbtn_mid_command=show-text ${chapter-list} 3000
chapter_next_mbtn_right_command=script-binding select/select-chapter

playlist_prev_mbtn_left_command=playlist-prev
playlist_prev_mbtn_mid_command=show-text ${playlist} 3000
playlist_prev_mbtn_right_command=script-binding select/select-playlist

playlist_next_mbtn_left_command=playlist-next
playlist_next_mbtn_mid_command=show-text ${playlist} 3000
playlist_next_mbtn_right_command=script-binding select/select-playlist

fullscreen_mbtn_left_command=cycle fullscreen
fullscreen_mbtn_right_command=cycle window-maximized

info_mbtn_left_command=script-binding stats/display-page-1-toggle
ontop_mbtn_left_command=no-osd cycle ontop; show-text "${?ontop==yes:窗口置顶: 开启}${?ontop==no:窗口置顶: 关闭}"
screenshot_mbtn_left_command=no-osd screenshot video; show-text "已保存截图"
file_loop_mbtn_left_command=no-osd cycle-values loop-file inf no; show-text "${?loop-file==inf:单片循环: 开启}${?loop-file==no:单片循环: 关闭}"
file_loop_mbtn_right_command=no-osd cycle-values loop-playlist inf no; show-text "${?loop-playlist==inf:列表循环: 开启}${?loop-playlist==no:列表循环: 关闭}"

speed_mbtn_left_command=no-osd add speed 1; show-text "播放速度: ${speed}x"
speed_mbtn_right_command=no-osd set speed 1; show-text "播放速度: 1.0x"
speed_wheel_down_command=no-osd add speed -0.25; show-text "播放速度: ${speed}x"
speed_wheel_up_command=no-osd add speed 0.25; show-text "播放速度: ${speed}x"